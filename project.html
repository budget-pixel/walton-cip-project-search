<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIP Project Detail</title>

<style>

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    background:#f6f8fb;
    font-family:Arial, Helvetica, sans-serif;
    color:#172033;
  }

  .wc-project-page{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:54px 24px 80px;
  }

  .wc-project-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:28px;
    color:#006231;
    text-decoration:none;
    font-size:14px;
    font-weight:700;
  }

  .wc-project-hero{
    background:#ffffff;
    border-radius:28px;
    padding:42px;
    margin-bottom:26px;
    border:1px solid rgba(209,190,120,0.34);
    box-shadow:
      0 18px 44px rgba(0,98,49,0.08),
      0 6px 14px rgba(36,52,77,0.06);
  }

  .wc-project-category{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(0,98,49,0.08);
    color:#006231;
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:18px;
  }

  .wc-project-title{
    margin:0 0 16px 0;
    font-size:52px;
    line-height:1.05;
    font-weight:800;
    color:#172033;
  }

  .wc-project-description{
    font-size:18px;
    line-height:1.75;
    color:#475467;
    max-width:920px;
  }

  .wc-project-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:24px;
  }

  .wc-project-panel{
    background:#ffffff;
    border-radius:24px;
    padding:28px;
    border:1px solid rgba(209,190,120,0.34);
    box-shadow:
      0 14px 34px rgba(0,98,49,0.08),
      0 4px 12px rgba(36,52,77,0.06);
  }

  .wc-project-panel h2{
    margin:0 0 22px 0;
    font-size:22px;
    color:#172033;
  }

  .wc-project-metrics{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:16px;
  }

  .wc-project-metric{
    padding:18px;
    border-radius:18px;
    background:#f8faf8;
    border:1px solid rgba(0,98,49,0.08);
  }

  .wc-project-metric span{
    display:block;
    margin-bottom:8px;
    color:#667085;
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-metric strong{
    display:block;
    font-size:20px;
    line-height:1.3;
    color:#172033;
  }

  .wc-project-status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:18px;
    padding:10px 16px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
  }

  .wc-project-status::before{
    content:"";
    width:10px;
    height:10px;
    border-radius:999px;
    background:currentColor;
  }

  .wc-status-planning{
    background:rgba(209,190,120,0.18);
    color:#8b6d12;
  }

  .wc-status-design{
    background:rgba(9,127,187,0.12);
    color:#0b5f8a;
  }

  .wc-status-construction{
    background:rgba(0,98,49,0.12);
    color:#006231;
  }

  .wc-status-complete{
    background:rgba(52,64,84,0.10);
    color:#344054;
  }

  .wc-project-not-found{
    text-align:center;
    padding:120px 20px;
  }

  @media(max-width:900px){

    .wc-project-grid{
      grid-template-columns:1fr;
    }

    .wc-project-title{
      font-size:40px;
    }

  }

  @media(max-width:700px){

    .wc-project-page{
      padding:34px 16px 60px;
    }

    .wc-project-hero,
    .wc-project-panel{
      padding:24px;
      border-radius:22px;
    }

    .wc-project-title{
      font-size:32px;
    }

    .wc-project-description{
      font-size:16px;
    }

    .wc-project-metrics{
      grid-template-columns:1fr;
    }

  }

</style>
</head>

<body>

<div id="app"></div>

<script src="projects.js"></script>

<script>

const app = document.getElementById("app");

const params = new URLSearchParams(window.location.search);

const slug = params.get("project");

const project = wcProjects.find(p => p.slug === slug);

if(!project){

  app.innerHTML = `
    <div class="wc-project-not-found">
      <h1>Project Not Found</h1>
      <p>The requested project could not be located.</p>
    </div>
  `;

}else{

  app.innerHTML = `

    <main class="wc-project-page">

      <a class="wc-project-back"
         href="./?view=all">
         ← Back to Project Index
      </a>

      <section class="wc-project-hero">

        <div class="wc-project-category">
          ${project.category_label}
        </div>

        <h1 class="wc-project-title">
          ${project.title}
        </h1>

        <div class="wc-project-description">
          ${project.description}
        </div>

        <div class="wc-project-status ${project.status_class}">
          ${project.status_text}
        </div>

      </section>

      <div class="wc-project-grid">

        <section class="wc-project-panel">

          <h2>Project Information</h2>

          <div class="wc-project-metrics">

            <div class="wc-project-metric">
              <span>Project Budget</span>
              <strong>${project.budget}</strong>
            </div>

            <div class="wc-project-metric">
              <span>Funding Source</span>
              <strong>${project.funding}</strong>
            </div>

            <div class="wc-project-metric">
              <span>District</span>
              <strong>${project.district}</strong>
            </div>

            <div class="wc-project-metric">
              <span>Target Year</span>
              <strong>${project.target}</strong>
            </div>

          </div>

        </section>

        <section class="wc-project-panel">

          <h2>Project Summary</h2>

          <div class="wc-project-description">
            ${project.description}
          </div>

        </section>

      </div>

    </main>

  `;

}

</script>

</body>
</html>
