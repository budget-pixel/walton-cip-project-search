<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIP Project Detail</title>

<style>

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    background:#f6f8fb;
    font-family:Arial, Helvetica, sans-serif;
    color:#172033;
  }

  .wc-project-page{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:54px 24px 80px;
  }

  .wc-project-actions{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:28px;
  }

  .wc-project-back,
  .wc-project-full-search{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    min-height:42px;
    padding:10px 16px;
    border-radius:999px;
    text-decoration:none;
    font-size:14px;
    font-weight:700;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
  }

  .wc-project-back{
    color:#006231;
    background:#ffffff;
    border:1px solid rgba(0,98,49,0.14);
  }

  .wc-project-full-search{
    color:#ffffff;
    background:#006231;
    border:1px solid #006231;
    box-shadow:0 8px 18px rgba(0,98,49,0.16);
  }

  .wc-project-back:hover,
  .wc-project-full-search:hover{
    transform:translateY(-1px);
  }

  .wc-project-category{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(0,98,49,0.08);
    color:#006231;
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:18px;
  }

  .wc-project-hero-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }

  .wc-project-hero-top .wc-project-category{
    margin-bottom:0;
  }

  .wc-project-hero{
    background:#ffffff;
    border-radius:28px;
    padding:42px;
    margin-bottom:24px;
    border:1px solid rgba(209,190,120,0.34);
    box-shadow:
      0 18px 44px rgba(0,98,49,0.08),
      0 6px 14px rgba(36,52,77,0.06);
  }

  .wc-project-title{
    margin:0;
    font-size:52px;
    line-height:1.05;
    font-weight:800;
    color:#172033;
  }

  .wc-project-description{
    font-size:18px;
    line-height:1.75;
    color:#475467;
    max-width:920px;
  }

  .wc-project-overview-text{
    font-size:17px;
    line-height:1.75;
    color:#475467;
    text-align:justify;
    text-justify:inter-word;
  }

  .wc-project-kicker{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:14px;
    margin-top:28px;
    margin-bottom:32px;
  }

  .wc-project-kicker-item{
    padding:18px;
    border-radius:18px;
    background:#006231;
    border:1px solid #006231;
    box-shadow:0 10px 22px rgba(0,98,49,0.18);
  }

  .wc-project-kicker-item span{
    display:block;
    margin-bottom:7px;
    color:rgba(255,255,255,0.72);
    font-size:10px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-kicker-item strong{
    display:block;
    color:#ffffff;
    font-size:15px;
    line-height:1.35;
  }

  .wc-project-grid{
    display:grid;
    grid-template-columns:minmax(0,1.25fr) minmax(320px,.75fr);
    gap:24px;
  }

  .wc-project-panel{
    background:#ffffff;
    border-radius:24px;
    padding:28px;
    border:1px solid rgba(209,190,120,0.34);
    box-shadow:
      0 14px 34px rgba(0,98,49,0.08),
      0 4px 12px rgba(36,52,77,0.06);
  }

  .wc-project-panel h2{
    margin:0 0 22px 0;
    font-size:22px;
    color:#172033;
  }

  .wc-project-panel p{
    margin:0;
  }

  .wc-project-stack{
    display:flex;
    flex-direction:column;
    gap:24px;
  }

  .wc-project-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .wc-project-list-item{
    display:flex;
    justify-content:space-between;
    gap:18px;
    padding:15px 0;
    border-bottom:1px solid rgba(23,32,51,0.08);
  }

  .wc-project-list-item:last-child{
    border-bottom:0;
    padding-bottom:0;
  }

  .wc-project-list-item span{
    color:#667085;
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-list-item strong{
    color:#172033;
    font-size:15px;
    line-height:1.4;
    text-align:right;
  }

  .wc-project-budget-highlight{
    padding:24px;
    border-radius:20px;
    background:#006231;
    border:1px solid #006231;
    margin-bottom:18px;
    box-shadow:0 14px 28px rgba(0,98,49,0.20);
  }

  .wc-project-budget-highlight span{
    display:block;
    margin-bottom:8px;
    color:rgba(255,255,255,0.72);
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-budget-highlight strong{
    display:block;
    color:#ffffff;
    font-size:30px;
    line-height:1.2;
  }

  .wc-project-staff-value{
    padding:26px;
    border-radius:22px;
    background:linear-gradient(135deg,#006231,#007a3d);
    border:1px solid #006231;
    color:#ffffff;
    box-shadow:0 16px 34px rgba(0,98,49,0.22);
  }

  .wc-project-staff-value span{
    display:block;
    margin-bottom:8px;
    color:rgba(255,255,255,0.72);
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-staff-value .wc-project-staff-label{
    margin-bottom:10px;
  }

  .wc-project-staff-value strong{
    display:block;
    color:#ffffff;
    font-size:34px;
    line-height:1.1;
    margin-bottom:10px;
  }

  .wc-project-staff-value p{
    margin:0;
    color:rgba(255,255,255,0.86);
    font-size:15px;
    line-height:1.55;
  }

  .wc-project-staff-rows{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .wc-project-staff-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:12px 14px;
    border-radius:14px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.16);
  }

  .wc-project-staff-row span{
    margin:0;
    color:rgba(255,255,255,0.74);
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-staff-row strong{
    margin:0;
    color:#ffffff;
    font-size:14px;
    line-height:1.35;
    text-align:right;
  }

  .wc-project-year-breakdown{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:18px;
  }

  .wc-project-year-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:13px 15px;
    border-radius:14px;
    background:#f8faf8;
    border:1px solid rgba(0,98,49,0.08);
  }

  .wc-project-year-row span{
    color:#667085;
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-year-row strong{
    color:#172033;
    font-size:15px;
    line-height:1.35;
    text-align:right;
  }

  .wc-project-status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:18px;
    padding:10px 16px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
  }


  .wc-project-status::before{
    content:"";
    width:10px;
    height:10px;
    border-radius:999px;
    background:currentColor;
  }

  .wc-project-highlight-badges{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:18px;
  }

  .wc-project-highlight-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    border-radius:999px;
    background:rgba(0,98,49,0.10);
    color:#006231;
    font-size:12px;
    font-weight:700;
    letter-spacing:.04em;
    border:1px solid rgba(0,98,49,0.12);
  }

  .wc-project-highlight-badge::before{
    content:"✔";
    font-size:11px;
    line-height:1;
  }

  .wc-status-planning{
    background:rgba(209,190,120,0.18);
    color:#8b6d12;
  }

  .wc-status-design{
    background:rgba(9,127,187,0.12);
    color:#0b5f8a;
  }

  .wc-status-construction{
    background:rgba(0,98,49,0.12);
    color:#006231;
  }

  .wc-status-complete{
    background:rgba(52,64,84,0.10);
    color:#344054;
  }

  .wc-project-not-found{
    text-align:center;
    padding:120px 20px;
  }

  .wc-project-timeline{
    position:relative;
    display:flex;
    flex-direction:column;
    gap:16px;
    padding-left:22px;
  }

  .wc-project-timeline::before{
    content:"";
    position:absolute;
    top:5px;
    bottom:5px;
    left:5px;
    width:2px;
    background:rgba(0,98,49,0.16);
  }

  .wc-project-timeline-item{
    position:relative;
  }

  .wc-project-timeline-item::before{
    content:"";
    position:absolute;
    top:5px;
    left:-22px;
    width:12px;
    height:12px;
    border-radius:999px;
    background:#006231;
    box-shadow:0 0 0 4px rgba(0,98,49,0.12);
  }

  .wc-project-timeline-item span{
    display:block;
    margin-bottom:5px;
    color:#667085;
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .wc-project-timeline-item strong{
    display:block;
    color:#172033;
    font-size:15px;
    line-height:1.45;
  }

  @media(max-width:900px){

    .wc-project-grid{
      grid-template-columns:1fr;
    }

    .wc-project-title{
      font-size:40px;
    }

    .wc-project-kicker{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

  }

  @media(max-width:700px){

    .wc-project-page{
      padding:34px 16px 60px;
    }

    .wc-project-hero,
    .wc-project-panel{
      padding:24px;
      border-radius:22px;
    }

    .wc-project-title{
      font-size:32px;
    }

    .wc-project-description{
      font-size:16px;
    }

    .wc-project-actions{
      align-items:stretch;
    }

    .wc-project-back,
    .wc-project-full-search{
      width:100%;
    }

    .wc-project-kicker{
      grid-template-columns:1fr;
    }

    .wc-project-list-item{
      display:block;
    }

    .wc-project-list-item strong{
      display:block;
      margin-top:6px;
      text-align:left;
    }

    .wc-project-year-row{
      display:block;
    }

    .wc-project-year-row strong{
      display:block;
      margin-top:6px;
      text-align:left;
    }

    .wc-project-staff-row{
      display:block;
    }

    .wc-project-staff-row strong{
      display:block;
      margin-top:6px;
      text-align:left;
    }

    .wc-project-metrics{
      grid-template-columns:1fr;
    }

  }

</style>
</head>

<body>

<div id="app"></div>

<script src="projects.js"></script>

<script>

const app = document.getElementById("app");

function escapeHtml(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function displayValue(value, fallback = "Not specified"){
  if(value === null || value === undefined || String(value).trim() === ""){
    return fallback;
  }
  return escapeHtml(value);
}

function getProjectValue(project, keys, fallback = "Not specified"){
  for(const key of keys){
    if(project[key] !== null && project[key] !== undefined && String(project[key]).trim() !== ""){
      return project[key];
    }
  }
  return fallback;
}

const WC_CIP_BASE_URL = "https://budget-pixel.github.io/walton-cip-project-search/";

function buildBackHref(){
  return `${WC_CIP_BASE_URL}?view=all`;
}

function renderListItem(label, value){
  return `
    <div class="wc-project-list-item">
      <span>${escapeHtml(label)}</span>
      <strong>${displayValue(value)}</strong>
    </div>
  `;
}

function normalizeFundingBreakdown(project){
  const possibleBreakdowns = [
    project.funding_by_year,
    project.fiscal_year_breakdown,
    project.funding_breakdown,
    project.yearly_funding,
    project.budget_by_year,
    project.fy_breakdown
  ];

  const breakdown = possibleBreakdowns.find(item => Array.isArray(item) && item.length);

  if(!breakdown){
    return [];
  }

  return breakdown
    .map(item => {
      if(Array.isArray(item)){
        return {
          year:item[0],
          amount:item[1]
        };
      }

      return {
        year:item.year || item.fiscal_year || item.fy || item.label,
        amount:item.amount || item.value || item.budget || item.funding || item.total
      };
    })
    .filter(item => item.year || item.amount);
}

function renderFundingBreakdown(project){
  const yearlyFunding = normalizeFundingBreakdown(project);

  if(!yearlyFunding.length){
    return "";
  }

  return `
    <h2 style="margin-top:26px;">Fiscal Year Breakdown</h2>
    <div class="wc-project-year-breakdown">
      ${yearlyFunding.map(item => `
        <div class="wc-project-year-row">
          <span>${displayValue(item.year)}</span>
          <strong>${displayValue(item.amount)}</strong>
        </div>
      `).join("")}
    </div>
  `;
}


function renderStaffDeliveryValue(project){
  if(!project.has_in_house_engineering){
    return "";
  }

  const value = project.in_house_engineering_value_formatted || displayValue(project.in_house_engineering_value);
  const rows = Array.isArray(project.in_house_engineering_rows) ? project.in_house_engineering_rows : [];

  return `
    <section class="wc-project-panel">
      <h2>In-House Engineering</h2>
      <div class="wc-project-staff-value">
        <span class="wc-project-staff-label">Estimated Outsource Cost Avoidance</span>
        <strong>${displayValue(value)}</strong>
        <p>Engineering services for this project are being delivered by Walton County staff rather than external consultants.</p>

        ${rows.length ? `
          <div class="wc-project-staff-rows">
            ${rows.map(row => `
              <div class="wc-project-staff-row">
                <span>${displayValue(row.year,"Fiscal Year")}</span>
                <strong>${displayValue(row.amount)}</strong>
              </div>
            `).join("")}
          </div>
        ` : ""}
      </div>
    </section>
  `;
}

function renderOverviewBadges(project){
  const badges = [];

  if(project.has_in_house_engineering){
    badges.push(`
      <div class="wc-project-highlight-badge">
        In-House Engineering · ${displayValue(project.in_house_engineering_value_formatted || project.in_house_engineering_value)}
      </div>
    `);
  }

  // Removed Priority badge block

  if(!badges.length){
    return "";
  }

  return `
    <div class="wc-project-highlight-badges">
      ${badges.join("")}
    </div>
  `;
}

const params = new URLSearchParams(window.location.search);

const slug = params.get("project");

const project = wcProjects.find(p => p.slug === slug);
const backHref = buildBackHref();

if(!project){

  app.innerHTML = `
    <div class="wc-project-not-found">
      <h1>Project Not Found</h1>
      <p>The requested project could not be located.</p>
      <p><a class="wc-project-back" href="${backHref}">← Back to Project Index</a></p>
    </div>
  `;

}else{

  const category = getProjectValue(project,["category_label","category"]);
  const title = getProjectValue(project,["title"],"Untitled Project");
  const description = getProjectValue(project,["description","overview","summary"],"No project description is currently available.");
  const statusText = getProjectValue(project,["status_text","status"],"Status not specified");
  const statusClass = displayValue(project.status_class,"wc-status-planning");
  const budget = getProjectValue(project,["budget","project_budget","total_budget","cost"]);
  const funding = getProjectValue(project,["funding","funding_source","source"]);
  const district = getProjectValue(project,["district","commission_district"]);
  const target = getProjectValue(project,["target","target_year","year","fiscal_year"]);
  const department = getProjectValue(project,["department","related_department","dept"]);
  const location = getProjectValue(project,["location","project_location","address"]);
  const fiscalYear = getProjectValue(project,["fiscal_year","fy","year"]);

  app.innerHTML = `

    <main class="wc-project-page">

      <div class="wc-project-actions">
        <a class="wc-project-back" href="${backHref}">← Back to Project Search</a>
      </div>

      <section class="wc-project-hero">
        <h1 class="wc-project-title">
          ${displayValue(title)}
        </h1>
      </section>

      <div class="wc-project-grid">

        <div class="wc-project-stack">

          <section class="wc-project-panel">
            <h2>Project Overview</h2>
            <p class="wc-project-overview-text">${displayValue(description)}</p>
          </section>

          <section class="wc-project-panel">
            <h2>Budget & Funding Summary</h2>

            <div class="wc-project-budget-highlight">
              <span>Project Budget</span>
              <strong>${displayValue(budget)}</strong>
            </div>

            <div class="wc-project-list">
              ${renderListItem("Funding Source", funding)}
              ${renderListItem("Target Year", target)}
            </div>

            ${renderFundingBreakdown(project)}
          </section>

          ${renderStaffDeliveryValue(project)}

        </div>

        <div class="wc-project-stack">

          <section class="wc-project-panel">
            <h2>Project Details</h2>
            <div class="wc-project-list">
              ${renderListItem("Project Phase", statusText)}
              ${renderListItem("Department", department)}
              ${renderListItem("Project Manager", project.project_manager)}
              ${renderListItem("District", district)}
              ${renderListItem("Location", location)}
            </div>
          </section>

          <section class="wc-project-panel">
            <h2>Status & Timeline</h2>
            <div class="wc-project-timeline">
              <div class="wc-project-timeline-item">
                <span>Status</span>
                <strong>${displayValue(statusText)}</strong>
              </div>
              <div class="wc-project-timeline-item">
                <span>Start Date</span>
                <strong>${displayValue(project.start_date)}</strong>
              </div>
              <div class="wc-project-timeline-item">
                <span>Estimated Completion</span>
                <strong>${displayValue(project.estimated_completion_date)}</strong>
              </div>
              <div class="wc-project-timeline-item">
                <span>Target Year</span>
                <strong>${displayValue(target)}</strong>
              </div>
            </div>
          </section>

        </div>

      </div>
  `;

}

</script>

</body>
</html>
