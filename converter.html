<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CIP Project Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body style="font-family:Arial;padding:30px;max-width:1000px;margin:auto;">

  <h1>Walton CIP Project Converter</h1>
  <p>Upload the OpenGov Excel export. This will generate updated <strong>projects.js</strong> code.</p>

  <input type="file" id="fileInput" accept=".xlsx,.xls" />

  <br><br>

  <button onclick="copyOutput()">Copy projects.js Code</button>

  <br><br>

  <textarea id="output" style="width:100%;height:600px;font-family:monospace;"></textarea>

  <script>
    const fileInput = document.getElementById("fileInput");
    const output = document.getElementById("output");

    fileInput.addEventListener("change", handleFile);

    function clean(value){
      return String(value ?? "").trim();
    }

    function slugify(value){
      return String(value || "")
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function money(value){
      const num = Number(value || 0);
      if (!num) return "$0";
      if (Math.abs(num) >= 1000000) return "$" + (num / 1000000).toFixed(1).replace(".0","") + "M";
      if (Math.abs(num) >= 1000) return "$" + Math.round(num / 1000) + "K";
      return "$" + Math.round(num).toLocaleString();
    }

    function parseAmount(value){
      if(value === null || value === undefined || value === ""){
        return 0;
      }

      if(typeof value === "number"){
        return value;
      }

      const cleaned = String(value)
        .replace(/[$,]/g, "")
        .replace(/[()]/g, "-")
        .trim();

      const num = Number(cleaned);
      return Number.isFinite(num) ? num : 0;
    }

    function getBudgetAmountColumns(row){
      const keys = Object.keys(row);

      const fyColumns = keys.filter(function(key){
        return /^FY\s*20\d{2}$/i.test(key) || /^FY20\d{2}$/i.test(key);
      });

      if(fyColumns.length){
        return fyColumns;
      }

      const periodExpenseColumns = keys.filter(function(key){
        return /^Period\s+\d+\s+Expenses$/i.test(key);
      });

      if(periodExpenseColumns.length){
        return periodExpenseColumns;
      }

      return keys.filter(function(key){
        return /^Period\s+\d+\s+Proposed$/i.test(key);
      });
    }

    function periodColumnToFiscalYear(key){
      const match = String(key).match(/^Period\s+(\d+)/i);

      if(!match){
        return key.replace(/\s+/g, "").toUpperCase();
      }

      const periodNumber = Number(match[1]);
      const fiscalYear = 2026 + periodNumber;

      return "FY" + fiscalYear;
    }

    function getProjectAmount(row){
      const explicitTotal =
        parseAmount(row["Total"]) ||
        parseAmount(row["Total Amount"]) ||
        parseAmount(row["Project Total"]);

      if(explicitTotal){
        return explicitTotal;
      }

      return getBudgetAmountColumns(row).reduce(function(sum, key){
        return sum + parseAmount(row[key]);
      }, 0);
    }

    function getTargetYears(row){
      const fundedYears = getBudgetAmountColumns(row)
        .filter(function(key){
          return parseAmount(row[key]) !== 0;
        })
        .map(function(key){
          return periodColumnToFiscalYear(key);
        });

      if(fundedYears.length === 1){
        return fundedYears[0];
      }

      if(fundedYears.length > 1){
        return fundedYears[0] + "–" + fundedYears[fundedYears.length - 1];
      }

      return clean(row["Budget Period"] || row["Target Year"] || row["Fiscal Year"] || "FY2027");
    }

    function getFundingByYear(row){
      return getBudgetAmountColumns(row)
        .map(function(key){
          return {
            year: periodColumnToFiscalYear(key),
            amount_value: parseAmount(row[key]),
            amount: money(parseAmount(row[key]))
          };
        })
        .filter(function(item){
          return item.amount_value !== 0;
        });
    }

    function getField(row, possibleNames){
      for(const name of possibleNames){
        const value = clean(row[name]);
        if(value){
          return value;
        }
      }

      return "";
    }

    function isInHouseEngineeringDescription(value){
      const text = clean(value).toLowerCase();

      return (
        text.includes("in-house engineering") ||
        text.includes("in house engineering") ||
        text.includes("inhouse engineering") ||
        text.includes("internal engineering") ||
        text.includes("staff engineering")
      );
    }

    function getBudgetRowAmount(row){
      const explicitAmount =
        parseAmount(row["Amount"]) ||
        parseAmount(row["Budget Amount"]) ||
        parseAmount(row["Total"]) ||
        parseAmount(row["Total Amount"]);

      if(explicitAmount){
        return explicitAmount;
      }

      return getBudgetAmountColumns(row).reduce(function(sum, key){
        return sum + parseAmount(row[key]);
      }, 0);
    }

    function categoryFromText(text){
      const t = text.toLowerCase();

      if (t.includes("fire") || t.includes("sheriff") || t.includes("station") || t.includes("radio")) return "public safety";
      if (t.includes("park") || t.includes("beach") || t.includes("access")) return "parks";
      if (t.includes("drainage") || t.includes("stormwater")) return "drainage";
      if (t.includes("library") || t.includes("facility") || t.includes("building") || t.includes("center")) return "facilities";
      if (t.includes("tourism") || t.includes("visitor") || t.includes("dune")) return "tourism";

      return "transportation";
    }

    function labelFromCategory(category){
      return category
        .split(" ")
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(" ");
    }

    function departmentFromProposalName(proposalName){
      const value = clean(proposalName).toLowerCase();

      if(value.startsWith("bcc")) return "Administration";
      if(value.startsWith("pw")) return "Public Works/Engineering";
      if(value.startsWith("sheriff")) return "Sheriff";
      if(value.startsWith("tdc")) return "Beach Operations";
      if(value.startsWith("fm")) return "Building Construction & Maintenance";

      return "Walton County";
    }

    function statusFromPhase(phase){
      const p = phase.toLowerCase();

      if (p.includes("construction")) return ["Construction", "wc-status-construction"];
      if (p.includes("design")) return ["Design Phase", "wc-status-design"];
      if (p.includes("complete")) return ["Complete", "wc-status-complete"];

      return ["Planning Phase", "wc-status-planning"];
    }

    function handleFile(e){
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: "array" });

        const sheetName =
          workbook.SheetNames.find(name => name.toLowerCase().includes("proposal summary"))
          || workbook.SheetNames[0];

        const budgetSheetName =
          workbook.SheetNames.find(name => name.toLowerCase() === "budget")
          || workbook.SheetNames.find(name => name.toLowerCase().includes("budget"));

        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

        const budgetRows = budgetSheetName
          ? XLSX.utils.sheet_to_json(workbook.Sheets[budgetSheetName], { defval: "" })
          : [];

        const worksheetByProposal = {};

        budgetRows.forEach(function(row){
          const proposalKey = clean(row["Proposal"] || row["Proposal Name"] || "");
          const worksheetName = clean(row["Worksheet"] || row["Worksheet Name"] || "");

          if(proposalKey && worksheetName && !worksheetByProposal[proposalKey]){
            worksheetByProposal[proposalKey] = worksheetName;
          }
        });

        const inHouseEngineeringByProposal = {};

        budgetRows.forEach(function(row){
          const proposalKey = clean(row["Proposal"] || row["Proposal Name"] || "");
          const description = clean(row["Description"] || row["description"] || "");

          if(!proposalKey || !isInHouseEngineeringDescription(description)){
            return;
          }

          const amount = getBudgetRowAmount(row);

          if(!inHouseEngineeringByProposal[proposalKey]){
            inHouseEngineeringByProposal[proposalKey] = {
              value: 0,
              rows: []
            };
          }

          inHouseEngineeringByProposal[proposalKey].value += amount;
          inHouseEngineeringByProposal[proposalKey].rows.push({
            description,
            amount_value: amount,
            amount: money(amount)
          });
        });

        const projects = rows
          .filter(row => {
            const proposalName = clean(row["Proposal Name"] || row["Proposal"] || "");
            const name = clean(
              worksheetByProposal[proposalName] ||
              row["Worksheet"] ||
              row["Worksheet Name"] ||
              row["Proposal Name"] ||
              row["Project Name"] ||
              row["Name"]
            );
            return name;
          })
          .map(row => {
            const proposalName = clean(row["Proposal Name"] || row["Proposal"] || "");
            const title = clean(
              worksheetByProposal[proposalName] ||
              row["Worksheet"] ||
              row["Worksheet Name"] ||
              row["Proposal Name"] ||
              row["Project Name"] ||
              row["Name"]
            );
            const proposalNameVal = clean(row["Proposal Name"] || "");
            const dept = departmentFromProposalName(proposalName);
            const projectManager = getField(row,["Project Manager","project manager","Project manager"]);
            const estimatedCompletionDate = getField(row,["Estimated Completion Date","estimated completion date"]);
            const startDate = getField(row,["Start Date","start date"]);
            const priority = getField(row,["Project Priority","project priority"]);
            const strategicGoals = getField(row,["Strategic Goals","strategic goals"]);
            const operationalImpact = getField(row,["Operational Impact","operational impact"]);
            const pertinentInformation = getField(row,["Pertinent Information","pertinent information"]);
            const locationName = getField(row,["Location Name","location name"]);
            const phase = clean(row["Phase"] || row["Project Phase"] || "");
            const funding = clean(row["Fund"] || row["Funding Source"] || row["Source of Funding"] || "TBD");
            const district = clean(row["Commissioner District"] || row["commissioner district"] || row["Commissioner district"] || row["District"] || "Countywide");
            const description = clean(row["Project Narrative"] || row["project narrative"] || row["Description"] || row["Project Description"] || row["Justification"] || `${title} is included in Walton County’s five-year Capital Improvement Plan.`);

            const amount = getProjectAmount(row);
            const target = getTargetYears(row);
            const fundingByYear = getFundingByYear(row);
            const inHouseEngineering = inHouseEngineeringByProposal[proposalName] || { value: 0, rows: [] };

            const category = categoryFromText(`${title} ${dept} ${description}`);
            const status = statusFromPhase(phase);

            return {
              title,
              slug: slugify(title),
              proposal_name: proposalName,
              dept,
              project_manager: projectManager,
              estimated_completion_date: estimatedCompletionDate,
              start_date: startDate,
              priority,
              strategic_goals: strategicGoals,
              operational_impact: operationalImpact,
              pertinent_information: pertinentInformation,
              location_name: locationName,
              category,
              category_label: labelFromCategory(category),
              description,
              budget: money(amount),
              budget_value: amount,
              funding_by_year: fundingByYear,
              has_in_house_engineering: inHouseEngineering.value !== 0,
              in_house_engineering_value: inHouseEngineering.value,
              in_house_engineering_value_formatted: money(inHouseEngineering.value),
              in_house_engineering_rows: inHouseEngineering.rows,
              funding: funding || "TBD",
              district,
              target,
              status_text: status[0],
              status_class: status[1]
            };
          });

        output.value =
          "const wcProjects = " +
          JSON.stringify(projects, null, 2)
            .replace(/"([^"]+)":/g, "$1:") +
          ";\n";
      };

      reader.readAsArrayBuffer(file);
    }

    function copyOutput(){
      output.select();
      document.execCommand("copy");
      alert("projects.js code copied.");
    }
  </script>

</body>
</html>
